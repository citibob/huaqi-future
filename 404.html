<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ページが見つかりません | 華啓未来株式会社">
  <title>404 - ページが見つかりません | 華啓未来株式会社</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0a1628; --accent: #d4af37; --text: #333; --white: #fff; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--primary); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    .error-code { font-size: 120px; font-weight: 700; color: var(--accent); text-shadow: 0 0 30px rgba(212, 175, 55, 0.5); line-height: 1; margin-bottom: 20px; }
    h1 { font-size: 32px; margin-bottom: 16px; }
    p { font-size: 18px; opacity: 0.8; margin-bottom: 40px; max-width: 500px; }
    .btn { display: inline-block; padding: 16px 40px; background: var(--accent); color: var(--primary); text-decoration: none; font-weight: 600; border-radius: 8px; transition: all 0.3s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3); }
    .home-link { margin-top: 40px; }
    .home-link a { color: var(--white); opacity: 0.7; text-decoration: none; }
    .home-link a:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="error-code">404</div>
  <h1>ページが見つかりません</h1>
  <p>お探しのページは削除されたか、移動した可能性があります。<br>メインページに戻ってください。</p>
  <a href="/" class="btn">トップに戻る</a>
  <div class="home-link">
    <a href="/">https://citibob.github.io/huaqi-future/</a>
  </div>
</body>
</html>
