<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <defs>
    <style>
      .sketch { stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1a2e"/>
      <stop offset="100%" style="stop-color:#0a1220"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d87a"/>
      <stop offset="50%" style="stop-color:#e8b830"/>
      <stop offset="100%" style="stop-color:#c8920a"/>
    </linearGradient>
    <filter id="pencil">
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.9"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e8c840;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#e8c840;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="leftGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e8524a;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#e8524a;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f0a8c0;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#f0a8c0;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="280" fill="url(#bgGrad)"/>

  <!-- Stars -->
  <g opacity="0.3">
    <circle cx="30" cy="28" r="0.8" fill="white"/>
    <circle cx="72" cy="45" r="0.6" fill="white"/>
    <circle cx="200" cy="15" r="0.8" fill="white"/>
    <circle cx="335" cy="32" r="0.6" fill="white"/>
    <circle cx="375" cy="52" r="0.8" fill="white"/>
    <circle cx="18" cy="160" r="0.6" fill="white"/>
    <circle cx="382" cy="150" r="0.6" fill="white"/>
    <circle cx="48" cy="248" r="0.7" fill="white"/>
    <circle cx="355" cy="242" r="0.7" fill="white"/>
  </g>

  <!-- ══════════════ LEFT: 中国 — 云纹+梅花 ══════════════ -->
  <ellipse cx="100" cy="125" rx="80" ry="72" fill="url(#leftGlow)"/>

  <!-- 云纹 cloud scroll -->
  <g filter="url(#pencil)" opacity="0.8">
    <path d="M44,96 C48,82 62,76 76,80 C78,68 90,62 104,67 C108,56 122,53 132,60 C139,53 152,54 155,65 C166,63 174,72 169,83 C178,85 180,97 173,103 C175,112 168,119 159,116 C156,127 145,131 136,124 C129,133 116,132 112,122 C101,127 89,120 89,109 C78,111 66,104 64,95 C56,97 46,90 44,96 Z"
          fill="#150505" stroke="#e8524a" stroke-width="1.8" class="sketch"/>
    <path d="M78,97 C83,90 93,88 100,93" fill="none" stroke="#e8524a" stroke-width="1.2" class="sketch" opacity="0.55"/>
    <path d="M102,93 C110,86 122,89 124,98" fill="none" stroke="#e8524a" stroke-width="1.2" class="sketch" opacity="0.55"/>
    <path d="M86,108 C92,103 102,102 108,107" fill="none" stroke="#e8524a" stroke-width="1" class="sketch" opacity="0.45"/>
    <path d="M64,95 C58,100 55,110 62,114" fill="none" stroke="#e8524a" stroke-width="1.4" class="sketch" opacity="0.55"/>
    <path d="M159,116 C164,123 161,132 154,134" fill="none" stroke="#e8524a" stroke-width="1.4" class="sketch" opacity="0.55"/>
  </g>

  <!-- 梅花 plum blossom -->
  <g transform="translate(85, 168)" filter="url(#pencil)" opacity="0.9">
    <ellipse cx="0" cy="-13" rx="6.5" ry="9.5" fill="#150505" stroke="#e8524a" stroke-width="1.5" class="sketch" transform="rotate(0)"/>
    <ellipse cx="0" cy="-13" rx="6.5" ry="9.5" fill="#150505" stroke="#e8524a" stroke-width="1.5" class="sketch" transform="rotate(72)"/>
    <ellipse cx="0" cy="-13" rx="6.5" ry="9.5" fill="#150505" stroke="#e8524a" stroke-width="1.5" class="sketch" transform="rotate(144)"/>
    <ellipse cx="0" cy="-13" rx="6.5" ry="9.5" fill="#150505" stroke="#e8524a" stroke-width="1.5" class="sketch" transform="rotate(216)"/>
    <ellipse cx="0" cy="-13" rx="6.5" ry="9.5" fill="#150505" stroke="#e8524a" stroke-width="1.5" class="sketch" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="5" fill="#e8524a" opacity="0.85"/>
    <circle cx="0" cy="0" r="2.5" fill="#f5d87a" opacity="0.9"/>
    <line x1="0" y1="-5" x2="0" y2="-9" stroke="#f5d87a" stroke-width="0.8" opacity="0.7"/>
    <line x1="4.3" y1="-2.5" x2="7.5" y2="-5.5" stroke="#f5d87a" stroke-width="0.8" opacity="0.7"/>
    <line x1="-4.3" y1="-2.5" x2="-7.5" y2="-5.5" stroke="#f5d87a" stroke-width="0.8" opacity="0.7"/>
  </g>

  <!-- Small bud -->
  <g transform="translate(48, 180)" opacity="0.45" filter="url(#pencil)">
    <ellipse cx="0" cy="-7" rx="4" ry="5.5" fill="none" stroke="#e8524a" stroke-width="1.2" class="sketch" transform="rotate(0)"/>
    <ellipse cx="0" cy="-7" rx="4" ry="5.5" fill="none" stroke="#e8524a" stroke-width="1.2" class="sketch" transform="rotate(72)"/>
    <ellipse cx="0" cy="-7" rx="4" ry="5.5" fill="none" stroke="#e8524a" stroke-width="1.2" class="sketch" transform="rotate(144)"/>
    <ellipse cx="0" cy="-7" rx="4" ry="5.5" fill="none" stroke="#e8524a" stroke-width="1.2" class="sketch" transform="rotate(216)"/>
    <ellipse cx="0" cy="-7" rx="4" ry="5.5" fill="none" stroke="#e8524a" stroke-width="1.2" class="sketch" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="3" fill="#e8524a" opacity="0.55"/>
  </g>

  <text x="92" y="215" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#e8524a" opacity="0.1">中</text>

  <!-- ══════════════ RIGHT: 日本 — 桜+青海波 ══════════════ -->
  <ellipse cx="300" cy="125" rx="80" ry="72" fill="url(#rightGlow)"/>

  <!-- 青海波 wave pattern -->
  <g filter="url(#pencil)" opacity="0.72">
    <path d="M244,148 C244,127 275,117 275,117 C275,117 306,127 306,148 C296,137 254,137 244,148 Z" fill="#08111e" stroke="#6090c8" stroke-width="1.5" class="sketch"/>
    <path d="M275,148 C275,127 306,117 306,117 C306,117 337,127 337,148 C327,137 285,137 275,148 Z" fill="#08111e" stroke="#6090c8" stroke-width="1.5" class="sketch"/>
    <path d="M259,170 C259,149 290,139 290,139 C290,139 321,149 321,170 C311,159 269,159 259,170 Z" fill="#08111e" stroke="#6090c8" stroke-width="1.5" class="sketch"/>
    <path d="M244,192 C244,171 275,161 275,161 C275,161 306,171 306,192 C296,181 254,181 244,192 Z" fill="#08111e" stroke="#6090c8" stroke-width="1.5" class="sketch"/>
    <path d="M275,192 C275,171 306,161 306,161 C306,161 337,171 337,192 C327,181 285,181 275,192 Z" fill="#08111e" stroke="#6090c8" stroke-width="1.5" class="sketch"/>
    <path d="M255,143 C265,130 285,128 295,141" fill="none" stroke="#6090c8" stroke-width="0.8" opacity="0.45"/>
    <path d="M286,143 C296,130 316,128 326,141" fill="none" stroke="#6090c8" stroke-width="0.8" opacity="0.45"/>
    <path d="M270,165 C280,152 300,150 310,163" fill="none" stroke="#6090c8" stroke-width="0.8" opacity="0.45"/>
  </g>

  <!-- 桜 cherry blossom -->
  <g transform="translate(312, 92)" filter="url(#pencil)" opacity="0.9">
    <path d="M0,-15 C-4,-15 -7,-10 -7,-6 C-7,0 -3,4 0,4 C3,4 7,0 7,-6 C7,-10 4,-15 0,-15 Z" fill="#150810" stroke="#f0a8c0" stroke-width="1.5" class="sketch" transform="rotate(0)"/>
    <path d="M0,-15 C-4,-15 -7,-10 -7,-6 C-7,0 -3,4 0,4 C3,4 7,0 7,-6 C7,-10 4,-15 0,-15 Z" fill="#150810" stroke="#f0a8c0" stroke-width="1.5" class="sketch" transform="rotate(72)"/>
    <path d="M0,-15 C-4,-15 -7,-10 -7,-6 C-7,0 -3,4 0,4 C3,4 7,0 7,-6 C7,-10 4,-15 0,-15 Z" fill="#150810" stroke="#f0a8c0" stroke-width="1.5" class="sketch" transform="rotate(144)"/>
    <path d="M0,-15 C-4,-15 -7,-10 -7,-6 C-7,0 -3,4 0,4 C3,4 7,0 7,-6 C7,-10 4,-15 0,-15 Z" fill="#150810" stroke="#f0a8c0" stroke-width="1.5" class="sketch" transform="rotate(216)"/>
    <path d="M0,-15 C-4,-15 -7,-10 -7,-6 C-7,0 -3,4 0,4 C3,4 7,0 7,-6 C7,-10 4,-15 0,-15 Z" fill="#150810" stroke="#f0a8c0" stroke-width="1.5" class="sketch" transform="rotate(288)"/>
    <line x1="0" y1="-15" x2="0" y2="-9" stroke="#f0a8c0" stroke-width="0.8" opacity="0.5" transform="rotate(0)"/>
    <line x1="0" y1="-15" x2="0" y2="-9" stroke="#f0a8c0" stroke-width="0.8" opacity="0.5" transform="rotate(72)"/>
    <line x1="0" y1="-15" x2="0" y2="-9" stroke="#f0a8c0" stroke-width="0.8" opacity="0.5" transform="rotate(144)"/>
    <line x1="0" y1="-15" x2="0" y2="-9" stroke="#f0a8c0" stroke-width="0.8" opacity="0.5" transform="rotate(216)"/>
    <line x1="0" y1="-15" x2="0" y2="-9" stroke="#f0a8c0" stroke-width="0.8" opacity="0.5" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="5" fill="#f0a8c0" opacity="0.75"/>
    <circle cx="0" cy="0" r="2.5" fill="#fff" opacity="0.8"/>
    <line x1="0" y1="-5" x2="0" y2="-10" stroke="#f0a8c0" stroke-width="0.8" opacity="0.8"/>
    <line x1="4.3" y1="-2.5" x2="8" y2="-5" stroke="#f0a8c0" stroke-width="0.8" opacity="0.8"/>
    <line x1="-4.3" y1="-2.5" x2="-8" y2="-5" stroke="#f0a8c0" stroke-width="0.8" opacity="0.8"/>
  </g>

  <!-- small sakura -->
  <g transform="translate(350, 148)" opacity="0.42" filter="url(#pencil)">
    <path d="M0,-9 C-3,-9 -5,-5 -5,-3 C-5,0 -2,2 0,2 C2,2 5,0 5,-3 C5,-5 3,-9 0,-9 Z" fill="none" stroke="#f0a8c0" stroke-width="1.1" class="sketch" transform="rotate(0)"/>
    <path d="M0,-9 C-3,-9 -5,-5 -5,-3 C-5,0 -2,2 0,2 C2,2 5,0 5,-3 C5,-5 3,-9 0,-9 Z" fill="none" stroke="#f0a8c0" stroke-width="1.1" class="sketch" transform="rotate(72)"/>
    <path d="M0,-9 C-3,-9 -5,-5 -5,-3 C-5,0 -2,2 0,2 C2,2 5,0 5,-3 C5,-5 3,-9 0,-9 Z" fill="none" stroke="#f0a8c0" stroke-width="1.1" class="sketch" transform="rotate(144)"/>
    <path d="M0,-9 C-3,-9 -5,-5 -5,-3 C-5,0 -2,2 0,2 C2,2 5,0 5,-3 C5,-5 3,-9 0,-9 Z" fill="none" stroke="#f0a8c0" stroke-width="1.1" class="sketch" transform="rotate(216)"/>
    <path d="M0,-9 C-3,-9 -5,-5 -5,-3 C-5,0 -2,2 0,2 C2,2 5,0 5,-3 C5,-5 3,-9 0,-9 Z" fill="none" stroke="#f0a8c0" stroke-width="1.1" class="sketch" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="2.5" fill="#f0a8c0" opacity="0.5"/>
  </g>

  <text x="308" y="215" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#6090c8" opacity="0.1">日</text>

  <!-- ══════════════ CENTER: 金色连接 ══════════════ -->
  <ellipse cx="200" cy="125" rx="55" ry="50" fill="url(#centerGlow)"/>

  <!-- Flowing ribbon -->
  <path d="M132,125 C152,104 172,146 200,125 C228,104 248,146 268,125"
        fill="none" stroke="#e8b830" stroke-width="2.5" class="sketch" opacity="0.85" filter="url(#pencil)"/>
  <path d="M132,129 C152,150 172,108 200,129 C228,150 248,108 268,129"
        fill="none" stroke="#c8920a" stroke-width="1.2" class="sketch" opacity="0.4" filter="url(#pencil)"/>

  <!-- Center circle with yin-yang inspired motif -->
  <g filter="url(#pencil)">
    <circle cx="200" cy="125" r="25" fill="#0d1a2e" stroke="#e8b830" stroke-width="2" class="sketch"/>
    <circle cx="200" cy="125" r="21" fill="none" stroke="#f5d87a" stroke-width="0.7" opacity="0.35" stroke-dasharray="3,5" class="sketch"/>
    <path d="M200,105 C212,105 220,114 220,125 C220,131 217,137 211,140 C205,143 200,139 200,133 C200,127 204,123 210,121 C215,119 220,122 220,125"
          fill="none" stroke="#f5d87a" stroke-width="1.8" class="sketch" opacity="0.7"/>
    <path d="M200,145 C188,145 180,136 180,125 C180,119 183,113 189,110 C195,107 200,111 200,117 C200,123 196,127 190,129 C185,131 180,128 180,125"
          fill="none" stroke="#f5d87a" stroke-width="1.8" class="sketch" opacity="0.7"/>
    <circle cx="200" cy="114" r="3.5" fill="#f5d87a" opacity="0.9" filter="url(#glow)"/>
    <circle cx="200" cy="136" r="3.5" fill="#f5d87a" opacity="0.9" filter="url(#glow)"/>
  </g>

  <!-- Sparkles -->
  <g stroke="#f5d87a" stroke-width="1.5" opacity="0.6" class="sketch">
    <line x1="143" y1="80" x2="143" y2="68"/><line x1="137" y1="74" x2="149" y2="74"/>
    <line x1="257" y1="80" x2="257" y2="68"/><line x1="251" y1="74" x2="263" y2="74"/>
    <line x1="200" y1="56" x2="200" y2="46"/><line x1="194" y1="51" x2="206" y2="51"/>
  </g>

  <!-- ══════════════ Bottom text ══════════════ -->
  <g opacity="0.4" filter="url(#pencil)">
    <line x1="58" y1="232" x2="152" y2="232" stroke="#c8920a" stroke-width="1" class="sketch"/>
    <polygon points="200,224 206,232 200,240 194,232" fill="#e8b830" opacity="0.8"/>
    <line x1="248" y1="232" x2="342" y2="232" stroke="#c8920a" stroke-width="1" class="sketch"/>
  </g>

  <text x="200" y="222" text-anchor="middle"
        font-family="Georgia, serif" font-size="15" font-weight="bold"
        fill="#f5d87a" letter-spacing="5" filter="url(#pencil)">中日友好貿易</text>

  <text x="200" y="250" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="8"
        fill="#7a9ab8" letter-spacing="4">CHINA · JAPAN  CULTURAL TRADE</text>

  <!-- Corner ornaments -->
  <g stroke="#c8920a" stroke-width="1.2" opacity="0.32" class="sketch" filter="url(#pencil)">
    <line x1="16" y1="16" x2="40" y2="16"/><line x1="16" y1="16" x2="16" y2="40"/>
    <line x1="384" y1="16" x2="360" y2="16"/><line x1="384" y1="16" x2="384" y2="40"/>
    <line x1="16" y1="264" x2="40" y2="264"/><line x1="16" y1="264" x2="16" y2="240"/>
    <line x1="384" y1="264" x2="360" y2="264"/><line x1="384" y1="264" x2="384" y2="240"/>
  </g>
  <rect x="8" y="8" width="384" height="264" rx="10" fill="none" stroke="#c8920a" stroke-width="0.8" opacity="0.16" class="sketch"/>
</svg>
