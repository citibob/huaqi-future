<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#92400e;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="gem" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  <g transform="translate(200,200)">
    <polygon points="0,-120 80,-40 80,40 0,120 -80,40 -80,-40" fill="url(#gem)" stroke="#fbbf24" stroke-width="3"/>
    <polygon points="0,-80 53,-27 53,27 0,80 -53,27 -53,-27" fill="#fef3c7" opacity="0.5"/>
    <polygon points="0,-40 27,-14 27,14 0,40 -27,14 -27,-14" fill="#fff" opacity="0.8"/>
  </g>
  <text x="200" y="340" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="24" font-weight="bold">GEM PACK</text>
</svg>
