<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E%F0%9F%98%80%3C/text%3E%3C/svg%3E">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=deVice-width, initial-scale=1.0">
  <meta name="description" content="華啓未来株式会社へのお問い合わせはこちら。ポケモンカード・原神グッズの輸入販売、中日貿易に関するお問い合わせを受け付けております。">
    <link rel="canonical" href="https://citibob.github.io/huaqi-future/contact.html">
  <title>お問い合わせ | 華啓未来株式会社</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;600;700&display=swap">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0a1628; --secondary: #1a365d; --accent: #d4af37; --accent-light: #f4d03f; --text: #333; --text-light: #666; --white: #fff; --bg: #f8f9fa; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Noto Sans JP', sans-serif; color: var(--text); background: var(--bg); line-height: 1.8; }
    
    header { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(10, 22, 40, 0.95); backdrop-filter: blur(10px); }
    header.scrolled { background: rgba(10, 22, 40, 0.98); box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
    .header-inner { max-width: 1200px; margin: 0 auto; padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; }
    .logo img { height: 36px; width: auto; }

    /* Neon Logo */
    @keyframes flicker {
      0%, 100% {
        text-shadow:
          0 0 7px rgba(255,255,255,0.8),
          0 0 10px rgba(255,255,255,0.7),
          0 0 21px #8a2be2,
          0 0 42px #8a2be2,
          0 0 82px #8a2be2,
          0 0 92px #8a2be2;
        opacity: 1;
      }
      50% {
        text-shadow:
          0 0 2px rgba(255,255,255,0.3),
          0 0 5px rgba(255,255,255,0.2),
          0 0 10px #8a2be2,
          0 0 20px #8a2be2,
          0 0 40px #8a2be2;
        opacity: 0.6;
      }
    }
      0%, 100% { filter: brightness(100%); }
      50% { filter: brightness(110%) drop-shadow(0 0 5px rgba(255,255,255,1)); }
    }
    
    .hqft-neon-logo {
      display: inline-block;
      text-align: center;
      padding: 5px 10px;
      background: transparent;
    }
    
    .hqft-neon-logo .neon-title {
      font-family: 'Segoe UI', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      font-size: 24px;
      font-weight: 900;
      margin: 0;
      line-height: 1;
      color: #fff;
      text-shadow:
        0 0 7px rgba(255,255,255,0.8),
        0 0 10px rgba(255,255,255,0.7),
        0 0 21px #8a2be2,
        0 0 42px #8a2be2,
        0 0 82px #8a2be2,
        0 0 92px #8a2be2;
      animation: flicker 4s infinite;
    }
    
    .hqft-neon-logo .neon-subtitle {
      font-family: 'Futura', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif;
      font-size: 6px;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      margin: 0;
      line-height: 1.2;
      color: #00ffff;
      text-shadow:
        0 0 4px rgba(255,255,255,0.6),
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        0 0 40px #00ffff;
    }
    nav ul { display: flex; list-style: none; gap: 35px; }
    nav a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 13px; font-weight: 400; letter-spacing: 0.5px; transition: color 0.3s; position: relative; }
    nav a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 1px; background: var(--accent); transition: width 0.3s; }
    nav a:hover, nav a.active { color: var(--accent); }
    nav a:hover::after, nav a.active::after { width: 100%; }
    
    .hamburger { display: none; flex-direction: column; justify-content: space-between; width: 24px; height: 18px; cursor: pointer; z-index: 1001; }
    .hamburger span { display: block; width: 100%; height: 2px; background: #fff; transition: all 0.3s; border-radius: 2px; }
    .hamburger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
    .nav-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
    .nav-overlay.active { display: block; }
    
    .page-header { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: var(--white); padding: 120px 30px 50px; text-align: center; }
    .page-header h1 { font-family: 'Noto Serif JP', serif; font-size: clamp(24px, 5vw, 36px); font-weight: 600; margin-bottom: 10px; }
    .page-header p { font-size: 15px; opacity: 0.85; }
    
    main { max-width: 900px; margin: 0 auto; padding: 45px 25px; }
    
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
    @media (max-width: 768px) { .contact-grid { grid-template-columns: 1fr; } }
    
    .contact-form { background: var(--white); padding: 35px; border-radius: 4px; box-shadow: 0 2px 15px rgba(0,0,0,0.04); }
    .contact-form h3 { font-family: 'Noto Serif JP', serif; font-size: 18px; color: var(--primary); margin-bottom: 22px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 7px; font-size: 13px; font-weight: 500; color: var(--primary); }
    .form-group label span { color: #c00; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 2px; font-size: 14px; font-family: inherit; transition: border-color 0.3s; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--secondary); }
    .form-group textarea { height: 130px; resize: vertical; }
    .submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%); color: var(--white); border: none; border-radius: 2px; font-size: 13px; font-weight: 500; letter-spacing: 1px; cursor: pointer; transition: all 0.3s; }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(26, 54, 93, 0.25); }
    
    .contact-info { background: var(--white); padding: 35px; border-radius: 4px; box-shadow: 0 2px 15px rgba(0,0,0,0.04); }
    .contact-info h3 { font-family: 'Noto Serif JP', serif; font-size: 18px; color: var(--primary); margin-bottom: 22px; }
    .info-item { margin-bottom: 20px; }
    .info-item h4 { font-size: 12px; color: var(--accent); margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
    .info-item p { font-size: 14px; color: var(--text-light); line-height: 1.7; }
    .info-item a { color: var(--secondary); text-decoration: none; }
    .info-item a:hover { text-decoration: underline; }
    
    .map-container { margin-top: 30px; }
    .map-container h3 { font-family: 'Noto Serif JP', serif; font-size: 18px; color: var(--primary); margin-bottom: 15px; }
    .map-frame { width: 100%; height: 250px; border: none; border-radius: 4px; }
    
    footer { background: var(--primary); color: var(--white); padding: 35px 25px; text-align: center; }
    footer .logo { margin-bottom: 12px; }
    footer .logo img { height: 28px; }
    footer p { font-size: 11px; opacity: 0.6; margin: 4px 0; }
    footer a { color: var(--accent); text-decoration: none; }
    
    @media (max-width: 768px) {
      .header-inner { padding: 8px 12px; }
      .logo img { height: 28px; max-width: 90px; }
      .hamburger { display: flex; }
      nav { position: fixed; top: 0; right: -100%; width: 75%; max-width: 260px; height: 100vh; background: rgba(10, 22, 40, 0.98); padding: 70px 25px 25px; transition: right 0.3s; box-shadow: -5px 0 20px rgba(0,0,0,0.3); }
      nav.active { right: 0; }
      nav ul { flex-direction: column; gap: 22px; }
      nav a { font-size: 15px; }
      .page-header { padding: 110px 20px 45px; }
      main { padding: 30px 18px; }
      .contact-form, .contact-info { padding: 25px; }
    }
  
    a[href^="mailto"] {
      color: #f5d87a;
      text-decoration: none;
    }
    a[href^="mailto"]:hover {
      text-decoration: underline;
      opacity: 0.85;
    }

  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo"><a href="index.html"><div class="hqft-neon-logo"><div class="neon-title">華啓</div><div class="neon-subtitle">FUTURE TRADING</div></div></a></div>
      <div class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
      <nav>
        <ul>
          <li><a href="index.html">ホーム</a></li>
          <li><a href="business.html">事業案内</a></li>
          <li><a href="company.html">会社情報</a></li>
          <li><a href="contact.html" class="active">お問い合わせ</a></li>
        </ul>
      </nav>
    </div>
    <div class="nav-overlay" onclick="toggleMenu()"></div>
  </header>
  
  <section class="page-header">
    <h1>お問い合わせ</h1>
    <p>お気軽にご連絡ください</p>
  </section>
  
  <main>
    <div class="contact-grid">
      <div class="contact-form">
        <h3>お問い合わせフォーム</h3>
        <form id="contactForm" onsubmit="sendMail(event)">
          <div class="form-group">
            <label for="name">お名前 <span>*</span></label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="form-group">
            <label for="email">メールアドレス <span>*</span></label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="subject">件名</label>
            <select id="subject" name="subject">
              <option value="">選択してください</option>
              <option value="事業について">事業について</option>
              <option value="商品について">商品について</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message">お問い合わせ内容 <span>*</span></label>
            <textarea id="message" name="message" required></textarea>
          </div>
          <button type="submit" class="submit-btn">送信する</button>
        </form>
      </div>
      
      <div class="contact-info">
        <h3>連絡先情報</h3>
        <div class="info-item">
          <h4>Email</h4>
          <p><a href="mailto:asiacardptcg@gmail.com">asiacardptcg@gmail.com</a></p>
        </div>
        <div class="info-item">
          <h4>所在地</h4>
          <p>〒231-0057 神奈川県横浜市中区曙町1-3<br>藤和伊勢佐木ハイターン615号室</p>
        </div>
        <div class="info-item">
          <h4>営業時間</h4>
          <p>平日 9:00 - 18:00<br>（土日祝を除く）</p>
        </div>
        <div class="info-item">
          <h4>会社情報</h4>
          <p>会社名：華啓未来株式会社<br>代表者：鮑 海明</p>
        </div>
        
        <div class="map-container">
          <h3>アクセス</h3>
          <iframe class="map-frame" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3249.293879224622!2d139.6376763152587!3d35.44750797927624!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60185c3f5e3b7a3d%3A0x12c5d4e6e1d0c5d4!2z5pel5pys44CB5q2m55Sw5biC5rOJ5bey5Y-w5p2x5rKz5Y-jLjIwLTYzMg!5e0!3m2!1sja!2sjp!4v1640000000000!5m2!1sja!2sjp" allowfullscreen="" loading="lazy"></iframe>
        </div>
      </div>
    </div>
  </main>
  
  
    <div class="logo"><div class="hqft-neon-logo" style="padding: 5px 10px;"><div class="neon-title" style="font-size: 18px;">華啓</div><div class="neon-subtitle" style="font-size: 5px;">FUTURE TRADING</div></div></div>
    <p>© 2024 華啓未来株式会社 All Rights Reserved.</p>
  </footer>
  <script>
    function toggleMenu() {
      document.querySelector('.hamburger').classList.toggle('active');
      document.querySelector('nav').classList.toggle('active');
      document.querySelector('.nav-overlay').classList.toggle('active');
    }
    document.querySelectorAll('nav a').forEach(link => link.addEventListener('click', () => toggleMenu()));
    
    function sendMail(e) {
      e.preventDefault();
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const subject = document.getElementById("subject").value || "お問い合わせ";
      const message = document.getElementById("message").value;
      const body = "お名前: " + name + "\nメールアドレス: " + email + "\n\n" + message;
      window.location.href = "mailto:asiacardptcg@gmail.com?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body);
    }
  </script>
</body>
</html>
