<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="50%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#0f2027"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect x="0" y="0" width="500" height="120" rx="8" fill="url(#bgGrad)"/>
  
  <!-- 华启汉字 -->
  <text x="50" y="75" font-family="Noto Serif JP, serif" font-size="52" font-weight="bold" fill="url(#goldGrad)" filter="url(#glow)">华启</text>
  
  <!-- 金色光芒星星 -->
  <g transform="translate(170, 60)" filter="url(#glow)">
    <polygon points="0,-20 5,-6 20,-6 8,3 13,18 0,9 -13,18 -8,3 -20,-6 -5,-6" fill="url(#goldGrad)"/>
    <polygon points="0,-12 3,-4 12,-4 5,2 8,11 0,5 -8,11 -5,2 -12,-4 -3,-4" fill="#fff8dc" opacity="0.6"/>
  </g>
  
  <!-- 横线装饰 -->
  <line x1="200" y1="40" x2="200" y2="80" stroke="url(#goldGrad)" stroke-width="2" opacity="0.5"/>
  
  <!-- HUAQI FUTURE -->
  <text x="220" y="55" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="url(#goldGrad)" letter-spacing="4">HUAQI FUTURE</text>
  <text x="220" y="75" font-family="Arial, sans-serif" font-size="10" fill="#b8860b" letter-spacing="3">TRADING CO., LTD.</text>
  
  <!-- 底部装饰线 -->
  <line x1="50" y1="95" x2="450" y2="95" stroke="url(#goldGrad)" stroke-width="1" opacity="0.3"/>
</svg>
