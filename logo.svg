<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a365d"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4d03f"/>
      <stop offset="50%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="80" rx="6" fill="url(#bgGrad)"/>
  
  <!-- 华启 -->
  <text x="25" y="52" font-family="'Shippori Mincho', 'Noto Serif JP', serif" font-size="36" font-weight="600" fill="url(#goldGrad)" filter="url(#glow)">華啓</text>
  
  <!-- 装饰线 -->
  <line x1="100" y1="25" x2="100" y2="55" stroke="url(#goldGrad)" stroke-width="1" opacity="0.4"/>
  
  <!-- Future -->
  <text x="115" y="38" font-family="Arial, sans-serif" font-size="11" fill="#d4af37" letter-spacing="6" font-weight="500">FUTURE</text>
  <text x="115" y="54" font-family="Arial, sans-serif" font-size="9" fill="#8b7355" letter-spacing="4">TRADING</text>
  
  <!-- 星星装饰 -->
  <g transform="translate(85, 40)" opacity="0.8">
    <polygon points="0,-8 2,-3 8,-3 3,1 5,7 0,3 -5,7 -3,1 -8,-3 -2,-3" fill="url(#goldGrad)"/>
  </g>
</svg>
